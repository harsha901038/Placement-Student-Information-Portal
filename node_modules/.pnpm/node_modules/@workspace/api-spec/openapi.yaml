openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Student Portal API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: student
    description: Student operations
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /student/profile:
    get:
      operationId: getStudentProfile
      tags: [student]
      summary: Get student profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"
    put:
      operationId: updateStudentProfile
      tags: [student]
      summary: Update student profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentProfile"

  /student/jobs:
    get:
      operationId: getStudentJobs
      tags: [student]
      summary: Get available jobs for students
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: number
      responses:
        "200":
          description: Jobs list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobsListResponse"

  /student/apply/{jobId}:
    post:
      operationId: applyToJob
      tags: [student]
      summary: Apply to a job
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /student/applications:
    get:
      operationId: getStudentApplications
      tags: [student]
      summary: Get student's job applications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationWithJob"

  /student/attendance:
    get:
      operationId: getAttendance
      tags: [student]
      summary: Get student attendance records
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceResponse"
    post:
      operationId: updateAttendance
      tags: [student]
      summary: Update attendance record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceUpdateRequest"
      responses:
        "200":
          description: Updated attendance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceResponse"

  /student/results:
    get:
      operationId: getSemesterResults
      tags: [student]
      summary: Get semester results
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Semester results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SemesterResult"
    post:
      operationId: addSemesterResult
      tags: [student]
      summary: Add semester result
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSemesterResultRequest"
      responses:
        "201":
          description: Result added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SemesterResult"

  /student/resume:
    get:
      operationId: getResume
      tags: [student]
      summary: Get student resume data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Resume data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeData"
    put:
      operationId: updateResume
      tags: [student]
      summary: Update resume data
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeData"
      responses:
        "200":
          description: Updated resume
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeData"

  /student/resume/score:
    post:
      operationId: scoreResume
      tags: [student]
      summary: Get resume score
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeData"
      responses:
        "200":
          description: Resume score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeScoreResponse"

  /admin/students:
    get:
      operationId: adminGetStudents
      tags: [admin]
      summary: Get all students
      security:
        - bearerAuth: []
      parameters:
        - name: minCgpa
          in: query
          schema:
            type: number
        - name: skills
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Students list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentProfile"

  /admin/jobs:
    get:
      operationId: adminGetJobs
      tags: [admin]
      summary: Get all jobs
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: adminCreateJob
      tags: [admin]
      summary: Create a job
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /admin/jobs/{id}:
    put:
      operationId: adminUpdateJob
      tags: [admin]
      summary: Update a job
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: adminDeleteJob
      tags: [admin]
      summary: Delete a job
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/applications:
    get:
      operationId: adminGetApplications
      tags: [admin]
      summary: Get all applications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApplicationWithDetails"

  /admin/applications/{id}:
    put:
      operationId: adminUpdateApplication
      tags: [admin]
      summary: Update application status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /admin/dashboard:
    get:
      operationId: adminGetDashboard
      tags: [admin]
      summary: Get dashboard stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [student, admin]
      required:
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserInfo"
      required:
        - token
        - user

    UserInfo:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
      required:
        - _id
        - name
        - email
        - role

    StudentProfile:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        profile:
          $ref: "#/components/schemas/ProfileDetails"
      required:
        - _id
        - name
        - email
        - role

    ProfileDetails:
      type: object
      properties:
        branch:
          type: string
        college:
          type: string
        rollNumber:
          type: string
        phone:
          type: string
        cgpa:
          type: number
        skills:
          type: array
          items:
            type: string
        about:
          type: string
        linkedIn:
          type: string
        github:
          type: string
        year:
          type: number
        semester:
          type: number

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        profile:
          $ref: "#/components/schemas/ProfileDetails"

    Job:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        company:
          type: string
        description:
          type: string
        eligibility:
          type: string
        minCgpa:
          type: number
        requiredSkills:
          type: array
          items:
            type: string
        location:
          type: string
        salary:
          type: string
        type:
          type: string
          enum: [internship, placement, both]
        deadline:
          type: string
        createdAt:
          type: string
      required:
        - _id
        - title
        - company

    CreateJobRequest:
      type: object
      properties:
        title:
          type: string
        company:
          type: string
        description:
          type: string
        eligibility:
          type: string
        minCgpa:
          type: number
        requiredSkills:
          type: array
          items:
            type: string
        location:
          type: string
        salary:
          type: string
        type:
          type: string
          enum: [internship, placement, both]
        deadline:
          type: string
      required:
        - title
        - company
        - description

    JobsListResponse:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        total:
          type: number
        page:
          type: number
        pages:
          type: number
      required:
        - jobs
        - total

    Application:
      type: object
      properties:
        _id:
          type: string
        studentId:
          type: string
        jobId:
          type: string
        status:
          type: string
          enum: [applied, shortlisted, rejected, selected]
        appliedAt:
          type: string
      required:
        - _id
        - studentId
        - jobId
        - status

    ApplicationWithJob:
      type: object
      properties:
        _id:
          type: string
        status:
          type: string
          enum: [applied, shortlisted, rejected, selected]
        appliedAt:
          type: string
        job:
          $ref: "#/components/schemas/Job"
      required:
        - _id
        - status

    ApplicationWithDetails:
      type: object
      properties:
        _id:
          type: string
        status:
          type: string
          enum: [applied, shortlisted, rejected, selected]
        appliedAt:
          type: string
        student:
          $ref: "#/components/schemas/StudentProfile"
        job:
          $ref: "#/components/schemas/Job"
      required:
        - _id
        - status

    UpdateApplicationRequest:
      type: object
      properties:
        status:
          type: string
          enum: [applied, shortlisted, rejected, selected]
      required:
        - status

    AttendanceRecord:
      type: object
      properties:
        subject:
          type: string
        totalClasses:
          type: number
        attendedClasses:
          type: number
        percentage:
          type: number
      required:
        - subject
        - totalClasses
        - attendedClasses
        - percentage

    AttendanceResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceRecord"
        overallPercentage:
          type: number
      required:
        - records
        - overallPercentage

    AttendanceUpdateRequest:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceRecord"
      required:
        - records

    SubjectGrade:
      type: object
      properties:
        subject:
          type: string
        subjectCode:
          type: string
        credits:
          type: number
        grade:
          type: string
        gradePoints:
          type: number
      required:
        - subject
        - credits
        - grade
        - gradePoints

    SemesterResult:
      type: object
      properties:
        _id:
          type: string
        semester:
          type: number
        year:
          type: number
        subjects:
          type: array
          items:
            $ref: "#/components/schemas/SubjectGrade"
        sgpa:
          type: number
        cgpa:
          type: number
      required:
        - _id
        - semester
        - subjects
        - sgpa

    AddSemesterResultRequest:
      type: object
      properties:
        semester:
          type: number
        year:
          type: number
        subjects:
          type: array
          items:
            $ref: "#/components/schemas/SubjectGrade"
      required:
        - semester
        - subjects

    ResumeData:
      type: object
      properties:
        objective:
          type: string
        education:
          type: array
          items:
            $ref: "#/components/schemas/EducationEntry"
        experience:
          type: array
          items:
            $ref: "#/components/schemas/ExperienceEntry"
        skills:
          type: array
          items:
            type: string
        projects:
          type: array
          items:
            $ref: "#/components/schemas/ProjectEntry"
        certifications:
          type: array
          items:
            type: string
        achievements:
          type: array
          items:
            type: string

    EducationEntry:
      type: object
      properties:
        degree:
          type: string
        institution:
          type: string
        year:
          type: string
        cgpa:
          type: string
      required:
        - degree
        - institution

    ExperienceEntry:
      type: object
      properties:
        role:
          type: string
        company:
          type: string
        duration:
          type: string
        description:
          type: string
      required:
        - role
        - company

    ProjectEntry:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        technologies:
          type: array
          items:
            type: string
        link:
          type: string
      required:
        - name
        - description

    ResumeScoreResponse:
      type: object
      properties:
        score:
          type: number
        maxScore:
          type: number
        breakdown:
          type: object
          properties:
            objective:
              type: number
            education:
              type: number
            experience:
              type: number
            skills:
              type: number
            projects:
              type: number
            certifications:
              type: number
        suggestions:
          type: array
          items:
            type: string
      required:
        - score
        - maxScore

    DashboardStats:
      type: object
      properties:
        totalStudents:
          type: number
        totalJobs:
          type: number
        totalApplications:
          type: number
        placed:
          type: number
        shortlisted:
          type: number
        recentApplications:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationWithDetails"
      required:
        - totalStudents
        - totalJobs
        - totalApplications
        - placed
        - shortlisted
